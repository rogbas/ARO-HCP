name: E2E Risk Assessment
on:
  pull_request:
    types: [opened, synchronize]
concurrency:
  group: e2e-risk-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write
  models: read
jobs:
  assess:
    name: Assess E2E risk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        id: risk
        with:
          script: |
            const assess = require('./.github/e2e-risk/assess.js')
            await assess({github, context, core})
